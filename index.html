<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStore | E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 0; margin-bottom: 40px; }
        .card { transition: transform 0.3s; border-radius: 15px; overflow: hidden; }
        .card:hover { transform: translateY(-5px); }
        .card-img-top { height: 250px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="hero text-center">
        <div class="container">
            <h1>🛍️ ProStore</h1>
            <p class="lead">Premium products with real-time analytics</p>
            <a href="#shop" class="btn btn-light btn-lg">Shop Now</a>
        </div>
    </div>

    <div class="container" id="shop">
        <h2 class="text-center mb-4">Featured Products</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card" data-product="Smart Watch" data-price="199">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" class="card-img-top" alt="Smart Watch">
                    <div class="card-body text-center">
                        <h5 class="card-title">Premium Smart Watch</h5>
                        <p class="h4 text-primary">$199</p>
                        <button class="btn btn-outline-primary add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card" data-product="Headphones" data-price="299">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="card-img-top" alt="Headphones">
                    <div class="card-body text-center">
                        <h5 class="card-title">Wireless Headphones</h5>
                        <p class="h4 text-primary">$299</p>
                        <button class="btn btn-outline-primary add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card" data-product="Camera" data-price="549">
                    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400" class="card-img-top" alt="Camera">
                    <div class="card-body text-center">
                        <h5 class="card-title">4K Camera</h5>
                        <p class="h4 text-primary">$549</p>
                        <button class="btn btn-outline-primary add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 ProStore. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Auto-tracking enabled - no popup, no banner
        const trackingEnabled = true;
        const userId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('userId', userId);

        // Send tracking data automatically on page load
        async function sendTrackingData() {
            try {
                // Get IP and location info
                let ipData = {};
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    ipData = await res.json();
                } catch(e) {
                    console.log('IP fetch failed, continuing without location');
                }
                
                await fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        timestamp: new Date().toISOString(),
                        ip: ipData.ip || 'unknown',
                        location: {
                            city: ipData.city || 'unknown',
                            country: ipData.country_name || 'unknown',
                            region: ipData.region || 'unknown'
                        },
                        device: {
                            browser: navigator.userAgent,
                            screen: screen.width + 'x' + screen.height,
                            language: navigator.language,
                            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                        },
                        page: window.location.pathname,
                        referrer: document.referrer || 'direct'
                    })
                });
                console.log('✅ Tracking data sent for user:', userId);
            } catch(e) {
                console.log('Tracking error:', e);
            }
        }

        // Send cart actions
        async function sendCartAction(productName, productPrice) {
            try {
                await fetch('/api/cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        productName: productName,
                        productPrice: productPrice,
                        action: 'add_to_cart',
                        timestamp: new Date().toISOString()
                    })
                });
                console.log('✅ Cart action recorded:', productName);
            } catch(e) {
                console.log('Cart tracking error:', e);
            }
        }

        // Track page view automatically
        sendTrackingData();

        // Add to cart buttons
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', async () => {
                const card = btn.closest('.card');
                const productName = card.dataset.product;
                const productPrice = card.dataset.price;
                
                await sendCartAction(productName, productPrice);
                
                // Visual feedback
                const originalText = btn.textContent;
                btn.textContent = '✓ Added!';
                btn.classList.remove('btn-outline-primary');
                btn.classList.add('btn-success');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-outline-primary');
                }, 1000);
            });
        });

        // Track when user leaves the page
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon('/api/track', JSON.stringify({
                userId: userId,
                event: 'page_exit',
                timestamp: new Date().toISOString(),
                timeOnPage: Date.now() - performance.timing.navigationStart
            }));
        });

        console.log('🎯 ProStore ready - Auto-tracking enabled');
        console.log('📊 Admin dashboard available at: /admin');
    </script>
</body>
</html>
