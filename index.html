<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStore | E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 0; margin-bottom: 40px; }
        .card { transition: transform 0.3s; border-radius: 15px; overflow: hidden; }
        .card:hover { transform: translateY(-5px); }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; color: white; padding: 15px; text-align: center; z-index: 1001; }
    </style>
</head>
<body>
    <div class="hero text-center">
        <div class="container">
            <h1>🛍️ ProStore</h1>
            <p class="lead">Premium products with real-time analytics</p>
            <a href="#shop" class="btn btn-light btn-lg">Shop Now</a>
        </div>
    </div>

    <div class="container" id="shop">
        <h2 class="text-center mb-4">Featured Products</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card" data-product="Smart Watch" data-price="199">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" class="card-img-top" alt="Smart Watch">
                    <div class="card-body text-center">
                        <h5 class="card-title">Premium Smart Watch</h5>
                        <p class="h4">$199</p>
                        <button class="btn btn-primary add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card" data-product="Headphones" data-price="299">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="card-img-top" alt="Headphones">
                    <div class="card-body text-center">
                        <h5 class="card-title">Wireless Headphones</h5>
                        <p class="h4">$299</p>
                        <button class="btn btn-primary add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card" data-product="Camera" data-price="549">
                    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400" class="card-img-top" alt="Camera">
                    <div class="card-body text-center">
                        <h5 class="card-title">4K Camera</h5>
                        <p class="h4">$549</p>
                        <button class="btn btn-primary add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="/admin" class="btn btn-dark admin-btn" target="_blank">📊 Admin Dashboard</a>

    <div id="cookieBanner" class="cookie-banner">
        <p>We collect anonymous data to improve your experience. <button class="btn btn-primary btn-sm" onclick="acceptTracking()">Accept</button></p>
    </div>

    <script>
        let trackingEnabled = false;
        let userId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('userId', userId);

        async function sendData(data) {
            try {
                await fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch(e) { console.log('Error sending data'); }
        }

        async function acceptTracking() {
            trackingEnabled = true;
            document.getElementById('cookieBanner').style.display = 'none';
            
            // Get IP info
            let ipData = {};
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch(e) {}
            
            await sendData({
                userId: userId,
                timestamp: new Date().toISOString(),
                ip: ipData.ip,
                location: {
                    city: ipData.city,
                    country: ipData.country_name
                },
                device: {
                    browser: navigator.userAgent,
                    screen: screen.width + 'x' + screen.height,
                    language: navigator.language
                },
                page: window.location.pathname
            });
        }

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!trackingEnabled) {
                    alert('Please accept tracking first');
                    return;
                }
                const card = btn.closest('.card');
                const product = {
                    userId: userId,
                    productName: card.dataset.product,
                    productPrice: card.dataset.price,
                    action: 'add_to_cart',
                    timestamp: new Date().toISOString()
                };
                await fetch('/api/cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                btn.textContent = '✓ Added!';
                setTimeout(() => btn.textContent = 'Add to Cart', 1000);
            });
        });
    </script>
</body>
</html>
